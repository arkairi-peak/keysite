<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Key System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: white;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #1a1d25;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .gen {
      background: #5865F2;
      color: white;
    }

    .copy {
      background: #2d2f36;
      color: white;
    }

    .keybox {
      margin-top: 15px;
      padding: 10px;
      background: #0d0f14;
      border-radius: 8px;
      word-break: break-all;
      min-height: 20px;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🔑 Key System</h2>

  <button class="gen" onclick="generateKey()">Generate Key</button>

  <div class="keybox" id="keyBox">No key generated</div>

  <button class="copy" onclick="copyKey()">Copy Key</button>

  <div class="status" id="status"></div>
</div>

<script>

let latestKey = ""

async function generateKey() {
  const status = document.getElementById("status")
  const box = document.getElementById("keyBox")

  try {
    status.innerText = "Generating..."

    const res = await fetch("https://key-api.dzaxtheonly1.workers.dev/generate")

    if (!res.ok) {
      throw new Error("HTTP error " + res.status)
    }

    const data = await res.json()

    console.log("DEBUG DATA:", data)

    if (!data || !data.length || !data[0].license_key) {
      throw new Error("Invalid response format")
    }

    const key = data[0].license_key

    box.innerText = key
    latestKey = key

    status.innerText = "Key generated successfully ✅"

  } catch (err) {
    console.log(err)
    status.innerText = "Error generating key ❌"
  }
}

function copyKey() {
  if (!latestKey) return

  navigator.clipboard.writeText(latestKey)

  document.getElementById("status").innerText =
    "Copied to clipboard 📋"
}

</script>

</body>
</html>
