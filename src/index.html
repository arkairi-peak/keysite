<!DOCTYPE html>
<html>

<head>
  <title>TapherLib Key System</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #5865F2;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    #result {
      margin-top: 20px;
      word-break: break-all;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>TapherLib Key System</h1>

  <button onclick="generateKey()">
    Generate Key
  </button>

  <div id="result"></div>

</div>

<script>

async function generateKey() {

  const response = await fetch(
    "https://key-api.dzaxtheonly1.workers.dev/generate"
  )

  const data = await response.json()

  document.getElementById("result").innerHTML =
    `
    <p>Your Key:</p>
    <b>${data[0].license_key}</b>
    `
}

</script>

</body>
</html>
